<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 初二英语听写小助手</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, #fff5f7 0%, #ffe4ec 100%);
            min-height: 100vh;
            padding: 16px 12px 30px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 42px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 60px rgba(255, 105, 135, 0.20);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            color: #b3405a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .app-title span {
            font-size: 26px;
        }

        .unit-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fceaf0;
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
            border: 1px solid #f5b8c8;
        }

        .unit-selector label {
            font-size: 13px;
            color: #8e3d52;
            font-weight: 600;
        }

        .unit-selector select {
            padding: 6px 8px;
            border-radius: 30px;
            border: 1px solid #f5b8c8;
            background: white;
            font-size: 15px;
            font-weight: 600;
            color: #b3405a;
            outline: none;
        }

        .unit-selector select:focus {
            border-color: #e86080;
        }

        .mode-badge {
            background: #f8ced9;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #8e3d52;
        }

        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 220, 230, 0.4);
            border-radius: 60px;
            padding: 6px 14px 6px 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 200, 210, 0.5);
        }

        .counter {
            font-size: 16px;
            font-weight: 600;
            color: #7a3a4a;
        }

        .counter strong {
            font-size: 22px;
            color: #c44a6a;
        }

        .progress-bar-bg {
            width: 80px;
            height: 6px;
            background: #fad4de;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f98aa8, #e86080);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .word-card {
            background: white;
            border-radius: 28px;
            padding: 24px 16px 18px;
            margin-bottom: 14px;
            box-shadow: 0 6px 24px rgba(255, 100, 130, 0.10);
            border: 1px solid rgba(255, 180, 200, 0.3);
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .word-en {
            font-size: 34px;
            font-weight: 700;
            color: #3d202a;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .word-phonetic {
            font-size: 18px;
            color: #b06a7a;
            margin-top: 4px;
            font-family: 'Times New Roman', serif;
        }

        .word-zh {
            font-size: 24px;
            font-weight: 500;
            color: #5a3340;
            margin-top: 8px;
            background: #fef0f3;
            padding: 4px 16px;
            border-radius: 40px;
            display: inline-block;
        }

        .word-example {
            margin-top: 12px;
            padding: 10px 16px;
            background: #f8f0f5;
            border-radius: 16px;
            border-left: 4px solid #e86080;
            text-align: left;
            width: 100%;
            max-width: 380px;
        }

        .word-example .en {
            font-size: 15px;
            color: #3d202a;
            font-weight: 500;
        }

        .word-example .zh {
            font-size: 14px;
            color: #b06a7a;
            margin-top: 2px;
        }

        .word-example .label {
            font-size: 12px;
            color: #c08a9a;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .dictation-hidden .word-en {
            display: none !important;
        }
        .dictation-hidden .word-phonetic {
            display: none !important;
        }
        .dictation-hidden .word-zh {
            display: none !important;
        }
        .dictation-hidden .word-example {
            display: none !important;
        }
        .dictation-hidden .dictation-placeholder {
            display: block !important;
        }

        .dictation-placeholder {
            display: none;
            font-size: 20px;
            color: #b06a7a;
            padding: 16px 0;
        }
        .dictation-placeholder .big-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .dictation-placeholder .hint {
            font-size: 15px;
            color: #c08a9a;
        }
        .dictation-placeholder .progress-text {
            font-size: 14px;
            color: #d4a0b0;
            margin-top: 6px;
        }

        .learn-mode .word-en {
            display: block !important;
        }
        .learn-mode .word-phonetic {
            display: block !important;
        }
        .learn-mode .word-zh {
            display: inline-block !important;
        }
        .learn-mode .word-example {
            display: block !important;
        }
        .learn-mode .dictation-placeholder {
            display: none !important;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0 10px;
        }

        .btn {
            border: none;
            background: white;
            padding: 12px 6px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            color: #4d2e38;
            box-shadow: 0 4px 12px rgba(255, 130, 160, 0.15);
            transition: all 0.15s ease;
            border: 1px solid rgba(255, 200, 215, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.95);
            background: #fce8ee;
        }

        .btn-primary {
            background: #e86080;
            color: white;
            border: none;
            box-shadow: 0 6px 18px rgba(232, 96, 128, 0.35);
        }

        .btn-primary:active {
            background: #d14d6d;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e86080;
            color: #e86080;
        }

        .btn-success {
            background: #5fb38a;
            color: white;
            border: none;
            box-shadow: 0 6px 18px rgba(95, 179, 138, 0.3);
        }

        .btn-success:active {
            background: #4a9a73;
        }

        .btn-warning {
            background: #f5b06b;
            color: white;
            border: none;
        }

        .btn-full {
            grid-column: span 2;
        }
        .btn-sm {
            padding: 8px 12px;
            font-size: 13px;
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .mode-switch {
            display: flex;
            background: #fad8e0;
            border-radius: 60px;
            padding: 4px;
            margin: 4px 0 12px;
            border: 1px solid rgba(255, 200, 215, 0.4);
        }

        .mode-switch .btn {
            flex: 1;
            border-radius: 40px;
            padding: 8px 6px;
            font-size: 14px;
            background: transparent;
            border: none;
            box-shadow: none;
            color: #7a4a58;
        }

        .mode-switch .btn.active {
            background: white;
            color: #c44a6a;
            box-shadow: 0 4px 12px rgba(255, 100, 130, 0.2);
            border: 1px solid rgba(255, 180, 200, 0.3);
        }

        .camera-area {
            margin: 12px 0 10px;
            border-radius: 24px;
            overflow: hidden;
            background: #fceaf0;
            border: 2px dashed #f5b8c8;
            padding: 10px;
            text-align: center;
        }

        .camera-area video,
        .camera-area img {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 16px;
            background: #1a1114;
        }

        .camera-area .placeholder {
            padding: 18px 10px;
            color: #b06a7a;
            font-size: 14px;
        }

        .camera-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .camera-actions .btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 6px;
            font-size: 13px;
        }

        .ocr-result {
            background: white;
            border-radius: 20px;
            padding: 10px 14px;
            margin-top: 10px;
            border: 1px solid #f8ced9;
            max-height: 320px;
            overflow-y: auto;
        }

        .ocr-result label {
            font-size: 13px;
            color: #a06a7a;
            font-weight: 400;
            display: block;
            margin-bottom: 4px;
        }

        .ocr-word-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            border-bottom: 1px solid #f5e0e6;
            font-size: 14px;
        }

        .ocr-word-item:last-child {
            border-bottom: none;
        }

        .ocr-word-item .index {
            font-size: 13px;
            color: #b06a7a;
            min-width: 28px;
            font-weight: 600;
        }

        .ocr-word-item .word-en {
            font-size: 15px;
            font-weight: 600;
            color: #3d202a;
            min-width: 70px;
            text-align: left;
            display: block !important;
        }

        .ocr-word-item .word-zh {
            font-size: 12px;
            color: #b06a7a;
            min-width: 40px;
            background: none;
            padding: 0;
            margin: 0;
            display: inline-block !important;
        }

        .ocr-word-item input {
            flex: 1;
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid #f5b8c8;
            font-size: 14px;
            background: #fef8fa;
            outline: none;
            min-width: 60px;
        }

        .ocr-word-item input:focus {
            border-color: #e86080;
            box-shadow: 0 0 0 3px rgba(232, 96, 128, 0.12);
        }

        .ocr-word-item .status {
            font-size: 16px;
            min-width: 24px;
            text-align: center;
        }

        .batch-status {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 16px;
            background: #f8f0f2;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #5a3340;
        }

        .batch-status .btn {
            margin-top: 6px;
            padding: 8px 16px;
            font-size: 14px;
        }

        .result-box {
            margin-top: 14px;
            background: white;
            border-radius: 24px;
            padding: 14px 16px;
            border: 2px solid #f8ced9;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #f5e0e6;
            font-size: 15px;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-stats {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            padding: 8px 0 4px;
            color: #3d202a;
        }

        .error-list {
            margin-top: 12px;
            background: #fff5f7;
            border-radius: 20px;
            padding: 10px 14px;
            border: 1px solid #f8ced9;
        }

        .error-list h4 {
            color: #b3405a;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .error-tag {
            display: inline-block;
            background: #f8ced9;
            padding: 3px 12px;
            border-radius: 40px;
            margin: 3px 5px 3px 0;
            font-size: 14px;
            color: #6a3342;
        }

        .add-word-area {
            margin-top: 16px;
            background: rgba(255, 240, 245, 0.6);
            border-radius: 24px;
            padding: 12px 14px;
            border: 1px solid #fad4de;
        }

        .add-word-area input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #f5b8c8;
            font-size: 15px;
            margin-bottom: 6px;
            background: white;
            outline: none;
        }

        .add-word-area input:focus {
            border-color: #e86080;
            box-shadow: 0 0 0 3px rgba(232, 96, 128, 0.15);
        }

        .add-word-area .btn {
            padding: 8px;
            font-size: 14px;
        }

        .small-note {
            font-size: 11px;
            color: #b06a7a;
            margin-top: 4px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
            gap: 6px;
        }
        .gap-6 {
            gap: 6px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .text-center {
            text-align: center;
        }
        .text-success {
            color: #4a9a73;
        }
        .text-danger {
            color: #d94f6a;
        }
        .text-muted {
            color: #b06a7a;
        }
        .fw-bold {
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- 头部 + 单元选择 -->
        <div class="app-header">
            <div class="app-title"><span>🌸</span> 听写小助手</div>
            <div class="unit-selector">
                <label>📚</label>
                <select id="unitSelect">
                    <option value="0">Unit 1</option>
                    <option value="1">Unit 2</option>
                    <option value="2">Unit 3</option>
                    <option value="3">Unit 4</option>
                    <option value="4">Unit 5</option>
                    <option value="5">Unit 6</option>
                    <option value="6">Unit 7</option>
                    <option value="7">Unit 8</option>
                    <option value="8">Unit 9</option>
                    <option value="9">Unit 10</option>
                </select>
            </div>
        </div>

        <!-- 模式 -->
        <div class="mode-switch">
            <button class="btn active" data-mode="learn" id="modeLearn">📚 学习模式</button>
            <button class="btn" data-mode="dictation" id="modeDictation">🎧 听写模式</button>
        </div>

        <!-- 进度 -->
        <div class="progress-area">
            <span class="counter">第 <strong id="currentNum">1</strong> / <span id="totalNum">0</span> 个</span>
            <span class="mode-badge" id="modeBadge">📖 学习</span>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- 单词卡片 -->
        <div class="word-card learn-mode" id="wordCard">
            <div class="word-en" id="wordEn">beautiful</div>
            <div class="word-phonetic" id="wordPhonetic">/ˈbjuːtɪfl/</div>
            <div class="word-zh" id="wordZh">美丽的</div>
            <div class="word-example" id="wordExample">
                <span class="label">📝 例句</span>
                <div class="en" id="exampleEn">She is a beautiful girl.</div>
                <div class="zh" id="exampleZh">她是一个美丽的女孩。</div>
            </div>
            <div class="dictation-placeholder">
                <span class="big-icon">🔊</span>
                点击「朗读」听写<br>
                <span class="hint">按序号在纸上写答案</span>
                <div class="progress-text" id="dictationProgress">已听写: 0 / 0</div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-grid">
            <button class="btn btn-primary" id="speakBtn">🔊 朗读</button>
            <button class="btn btn-outline" id="nextBtn">⏭ 下一个</button>
            <button class="btn btn-warning" id="resetBtn">🔄 重来</button>
            <button class="btn btn-success" id="checkBtn">✅ 答案</button>
        </div>

        <!-- 拍照 & OCR -->
        <div class="camera-area" id="cameraArea">
            <div id="cameraPlaceholder" class="placeholder">
                📸 听写完成后拍照上传整页答案<br>
                <small style="color:#c08a9a;">建议按序号 1. 2. 3. ... 书写</small>
            </div>
            <video id="video" autoplay playsinline class="hidden"></video>
            <img id="capturedImage" class="hidden" alt="拍摄的照片">

            <div class="camera-actions">
                <button class="btn btn-primary" id="openCameraBtn">📷 相机</button>
                <button class="btn" id="captureBtn">📸 拍照</button>
                <button class="btn" id="uploadBtn">🖼 选图</button>
                <input type="file" id="fileInput" accept="image/*" style="display:none">
            </div>

            <!-- 识别结果列表 -->
            <div class="ocr-result hidden" id="ocrResult">
                <label>✍️ 识别结果（按序号对照，可手动修改）</label>
                <div id="ocrWordList"></div>
                <div class="batch-status" id="batchStatus">
                    <span>📝 确认答案后点击批改</span>
                    <button class="btn btn-primary btn-full" id="batchCheckBtn">📊 批量批改</button>
                </div>
            </div>
        </div>

        <!-- 结果 -->
        <div class="result-box hidden" id="resultBox">
            <div class="result-stats" id="resultStats">✅ 0 / 0 正确</div>
            <div id="resultDetail"></div>
        </div>

        <!-- 错词本 -->
        <div class="error-list hidden" id="errorList">
            <h4>📕 错词本</h4>
            <div id="errorTags"></div>
        </div>

        <!-- 添加单词 -->
        <div class="add-word-area">
            <div class="flex gap-6">
                <input type="text" id="newWordEn" placeholder="英文">
                <input type="text" id="newWordZh" placeholder="中文">
            </div>
            <input type="text" id="newWordPhonetic" placeholder="音标（选填）">
            <input type="text" id="newWordExample" placeholder="例句（选填，如：She is beautiful.）">
            <button class="btn btn-primary btn-full" id="addWordBtn">➕ 添加</button>
            <div class="small-note">💡 自动保存到当前单元</div>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. 词库（按单元分组，含例句）
        // ================================================================
        const UNIT_WORDS = [
            // Unit 1
            [
                { en: 'anyone', zh: '任何人', phonetic: '/ˈeniwʌn/', example: 'Is there anyone here?', exampleZh: '这里有人吗？' },
                { en: 'anywhere', zh: '任何地方', phonetic: '/ˈeniweə(r)/', example: 'You can go anywhere you like.',
                    exampleZh: '你可以去任何你喜欢的地方。' },
                { en: 'wonderful', zh: '精彩的', phonetic: '/ˈwʌndəfl/', example: 'We had a wonderful time.',
                    exampleZh: '我们度过了美好的时光。' },
                { en: 'few', zh: '很少', phonetic: '/fjuː/', example: 'Few people know the truth.', exampleZh: '很少人知道真相。' },
                { en: 'most', zh: '大多数', phonetic: '/məʊst/', example: 'Most students like this book.',
                    exampleZh: '大多数学生喜欢这本书。' },
                { en: 'something', zh: '某事物', phonetic: '/ˈsʌmθɪŋ/', example: 'I want to eat something.',
                    exampleZh: '我想吃点东西。' },
                { en: 'nothing', zh: '没有什么', phonetic: '/ˈnʌθɪŋ/', example: 'There is nothing in the box.',
                    exampleZh: '盒子里什么都没有。' },
                { en: 'everyone', zh: '每个人', phonetic: '/ˈevriwʌn/', example: 'Everyone loves spring.',
                    exampleZh: '每个人都喜欢春天。' },
                { en: 'myself', zh: '我自己', phonetic: '/maɪˈself/', example: 'I can do it myself.', exampleZh: '我自己能做。' },
                { en: 'yourself', zh: '你自己', phonetic: '/jɔːˈself/', example: 'Take care of yourself.',
                    exampleZh: '照顾好你自己。' },
            ],
            // Unit 2
            [
                { en: 'hen', zh: '母鸡', phonetic: '/hen/', example: 'The hen lays eggs every day.',
                    exampleZh: '这只母鸡每天下蛋。' },
                { en: 'pig', zh: '猪', phonetic: '/pɪɡ/', example: 'The pig is sleeping in the mud.',
                    exampleZh: '猪在泥里睡觉。' },
                { en: 'bored', zh: '厌倦的', phonetic: '/bɔːd/', example: 'I feel bored at home.', exampleZh: '我在家感到无聊。' },
                { en: 'someone', zh: '某人', phonetic: '/ˈsʌmwʌn/', example: 'Someone called you just now.',
                    exampleZh: '刚才有人给你打电话。' },
                { en: 'diary', zh: '日记', phonetic: '/ˈdaɪəri/', example: 'I write in my diary every night.',
                    exampleZh: '我每晚写日记。' },
                { en: 'activity', zh: '活动', phonetic: '/ækˈtɪvəti/', example: 'We have many after-school activities.',
                    exampleZh: '我们有很多课外活动。' },
                { en: 'decide', zh: '决定', phonetic: '/dɪˈsaɪd/', example: 'I decide to study harder.',

        // ================================================================
        // 3. 初始化
        // ================================================================
        function init() {
            const savedUnit = localStorage.getItem('current_unit');
            if (savedUnit !== null) {
                currentUnit = parseInt(savedUnit);
                unitSelect.value = currentUnit;
            }

            loadUnit(currentUnit);
            totalNum.textContent = words.length;
            resetQuiz();
            updateUI();
            bindEvents();
        }

        function loadUnit(unitIndex) {
            const saved = localStorage.getItem(`unit_${unitIndex}_words`);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed && parsed.length > 0) {
                        words = parsed;
                        return;
                    }
                } catch (e) {}
            }
            words = UNIT_WORDS[unitIndex] || UNIT_WORDS[0];
            words = words.map(w => ({ ...w }));
            saveUnitWords();
        }

        function saveUnitWords() {
            localStorage.setItem(`unit_${currentUnit}_words`, JSON.stringify(words));
            localStorage.setItem('current_unit', String(currentUnit));
        }

        function resetQuiz() {
            currentIndex = 0;
            results = [];
            errorWords = [];
            ocrWords = [];
            dictationCount = 0;
            answered = (mode === 'learn');
            resultBox.classList.add('hidden');
            errorList.classList.add('hidden');
            ocrResult.classList.add('hidden');
            ocrWordList.innerHTML = '';
            cameraPlaceholder.textContent = '📸 听写完成后拍照上传整页答案\n' +
                '💡 建议按序号 1. 2. 3. ... 书写';
            updateUI();
        }

        // ================================================================
        // 4. 渲染
        // ================================================================
        function updateUI() {
            if (words.length === 0) {
                wordEn.textContent = '📚 词库为空';
                wordPhonetic.textContent = '';
                wordZh.textContent = '请添加单词';
                wordExample.classList.add('hidden');
                currentNum.textContent = '0';
                progressFill.style.width = '0%';
                dictationProgress.textContent = '已听写: 0 / 0';
                return;
            }

            const idx = Math.min(currentIndex, words.length - 1);
            const w = words[idx];

            wordEn.textContent = w.en;
            wordPhonetic.textContent = w.phonetic || '';
            wordZh.textContent = w.zh;

            // 例句
            if (w.example && w.exampleZh) {
                exampleEn.textContent = w.example;
                exampleZh.textContent = w.exampleZh;
                wordExample.classList.remove('hidden');
            } else {
                wordExample.classList.add('hidden');
            }

            if (mode === 'learn') {
                wordCard.className = 'word-card learn-mode';
                answered = true;
            } else {
                wordCard.className = 'word-card dictation-hidden';
                if (answered) {
                    wordCard.className = 'word-card learn-mode';
                }
            }

            currentNum.textContent = idx + 1;
            totalNum.textContent = words.length;
            const pct = words.length > 0 ? ((idx + 1) / words.length * 100) : 0;
            progressFill.style.width = Math.min(pct, 100) + '%';

            modeBadge.textContent = mode === 'learn' ? '📖 学习' : '🎧 听写';
            dictationProgress.textContent = `已听写: ${dictationCount} / ${words.length}`;

            if (mode === 'dictation' && dictationCount >= words.length) {
                cameraPlaceholder.textContent = '🎉 所有单词已听完！请拍照上传你的答案 📸\n' +
                    '💡 建议按序号 1. 2. 3. ... 书写';
            }
        }

        // ================================================================
        // 5. 语音
        // ================================================================
        function speakWord() {
            if (words.length === 0) return;
            const w = words[Math.min(currentIndex, words.length - 1)];
            const text = w.en;

            if (!window.speechSynthesis) {
                alert('浏览器不支持语音功能。');
                return;
            }

            window.speechSynthesis.cancel();

            let voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                window.speechSynthesis.onvoiceschanged = () => {
                    voices = window.speechSynthesis.getVoices();
                    doSpeak(text, voices);
                };
                setTimeout(() => {
                    if (voices.length === 0) {
                        doSpeak(text, []);
                    }
                }, 3000);
            } else {
                doSpeak(text, voices);
            }

            if (mode === 'dictation' && !answered) {
                const idx = Math.min(currentIndex, words.length - 1);
                if (!results[idx]) {
                    dictationCount = Math.max(dictationCount, idx + 1);
                    updateUI();
                }
            }
        }

        function doSpeak(text, voices) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            utterance.volume = 1;

            for (const v of voices) {
                if (v.lang === 'en-US' && (v.name.includes('Google') || v.name.includes('Samantha') || v.name.includes(
                        'Alex'))) {
                    utterance.voice = v;
                    break;
                }
            }

            window.speechSynthesis.speak(utterance);
        }

        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        // ================================================================
        // 6. 核心操作
        // ================================================================
        function nextWord() {
            if (words.length === 0) return;

            if (currentIndex < words.length - 1) {
                currentIndex++;
                answered = (mode === 'learn');
                if (mode === 'dictation') answered = false;
                updateUI();
                ocrResult.classList.add('hidden');
                resultBox.classList.add('hidden');
                if (mode === 'dictation') {
                    setTimeout(() => speakWord(), 400);
                }
            } else {
                if (mode === 'dictation' && dictationCount >= words.length) {
                    alert('🎉 所有单词已听完！请拍照上传你的答案');
                } else if (mode === 'dictation') {
                    speakWord();
                } else {
                    alert('🎉 已学完所有单词！');
                }
            }
        }

        function showAnswer() {
            if (mode === 'learn') {
                speakWord();
                return;
            }
            if (words.length === 0) return;
            answered = true;
            updateUI();
            speakWord();
        }

        function resetQuizHandler() {
            if (confirm('重新开始会清除当前单元的所有进度，确定吗？')) {
                resetQuiz();
            }
        }

        // ================================================================
        // 7. OCR 识别
        // ================================================================
        async function performOCR(imageData) {
            ocrResult.classList.remove('hidden');
            batchStatus.innerHTML = '<span>⏳ 识别中...</span>';
            batchCheckBtn.disabled = true;

            try {
                const result = await Tesseract.recognize(imageData, 'eng', {
                    logger: (m) => {
                        if (m.status === 'recognizing text') {
                            batchStatus.innerHTML = `<span>⏳ 识别中 ${Math.round(m.progress * 100)}%</span>`;
                        }
                    }
                });

                const lines = result.data.text.split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0);

                const extracted = [];
                for (const line of lines) {
                    const match = line.match(/^(\d+)[\.\s]+([a-zA-Z']+)/);
                    if (match) {
                        const num = parseInt(match[1]) - 1;
                        const word = match[2].toLowerCase().replace(/[^a-zA-Z']/g, '');
                        extracted.push({ index: num, word: word });
                    } else {
                        const word = line.split(/\s+/)[0].toLowerCase().replace(/[^a-zA-Z']/g, '');
                        if (word) {
                            extracted.push({ index: extracted.length, word: word });
                        }
                    }
                }

                ocrWords = [];
                for (let i = 0; i < words.length; i++) {
                    ocrWords[i] = '';
                }

                for (const item of extracted) {
                    if (item.index >= 0 && item.index < words.length) {
                        ocrWords[item.index] = item.word;
                    }
                }

                let fillIndex = 0;
                for (let i = 0; i < words.length; i++) {
                    if (!ocrWords[i] && fillIndex < extracted.length) {
                        while (fillIndex < extracted.length && extracted[fillIndex].word) {
                            if (!ocrWords.includes(extracted[fillIndex].word)) {
                                ocrWords[i] = extracted[fillIndex].word;
                                fillIndex++;
                                break;
                            }
                            fillIndex++;
                        }
                    }
                }

                renderOCRList();

                const count = ocrWords.filter(w => w).length;
                batchStatus.innerHTML = `
                    <span>✅ 识别完成！识别到 ${count}/${words.length} 个单词</span>
                    <button class="btn btn-primary btn-full" id="batchCheckBtn">📊 批量批改</button>
                `;
                document.getElementById('batchCheckBtn')?.addEventListener('click', batchCheck);
                batchCheckBtn.disabled = false;

            } catch (err) {
                batchStatus.innerHTML = '<span>❌ 识别失败，请重试或手动输入</span>';
                console.warn('OCR Error:', err);
                batchCheckBtn.disabled = false;
            }
        }

        function renderOCRList() {
            let html = '';
            for (let i = 0; i < words.length; i++) {
                const w = words[i];
                const userAns = ocrWords[i] || '';
                const isChecked = results[i] !== undefined;
                const status = isChecked ? (results[i].correct ? '✅' : '❌') : '';

                html += `
                    <div class="ocr-word-item">
                        <span class="index">#${i+1}</span>
                        <span class="word-en">${w.en}</span>
                        <span class="word-zh">${w.zh}</span>
                        <input type="text" id="ocrInput_${i}" value="${userAns}" placeholder="..." ${isChecked ? 'disabled' : ''}>
                        <span class="status">${status}</span>
                    </div>
                `;
            }
            ocrWordList.innerHTML = html;

            if (results.length === words.length && results.every(r => r !== undefined)) {
                document.querySelectorAll('#ocrWordList input').forEach(inp => inp.disabled = true);
                batchCheckBtn.disabled = true;
                batchStatus.innerHTML = '<span>✅ 所有单词已批改完成！查看下方成绩单</span>';
            }
        }

        // ================================================================
        // 8. 批量批改
        // ================================================================
        function batchCheck() {
            const inputs = document.querySelectorAll('#ocrWordList input');
            let allFilled = true;

            for (let i = 0; i < inputs.length; i++) {
                const val = inputs[i].value.trim();
                if (!val) allFilled = false;
                ocrWords[i] = val;
            }

            if (!allFilled) {
                if (!confirm('有部分单词未填写答案，继续批改？（未填写的计为错误）')) {
                    return;
                }
            }

            let correct = 0;
            results = [];
            errorWords = [];

            for (let i = 0; i < words.length; i++) {
                const w = words[i];
                const userAns = ocrWords[i] || '';
                const isCorrect = userAns.toLowerCase() === w.en.toLowerCase();

                results[i] = {
                    en: w.en,
                    zh: w.zh,
                    userAnswer: userAns || '(未作答)',
                    correct: isCorrect
                };

                if (isCorrect) correct++;
                if (!isCorrect && userAns) {
                    if (!errorWords.includes(w.en)) {
                        errorWords.push(w.en);
                    }
                }
            }

            renderOCRList();
            updateErrorList();
            showFinalResult();

            batchStatus.innerHTML = `<span>✅ 批改完成！正确 ${correct}/${words.length}</span>`;
            batchCheckBtn.disabled = true;
            document.querySelectorAll('#ocrWordList input').forEach(inp => inp.disabled = true);
        }

        // ================================================================
        // 9. 显示结果
        // ================================================================
        function showFinalResult() {
            let correct = 0;
            let total = words.length;
            let detailHTML = '';

            for (let i = 0; i < total; i++) {
                const r = results[i];

                    if (r.correct) correct++;
                    const status = r.correct ? '✅' : '❌';
                    detailHTML += `
                        <div class="result-item">

                        </div>
                    `;
                } else {
                    const w = words[i];
                    detailHTML += `
                        <div class="result-item">
                            <span>⚠️ <strong>${w.en}</strong> <span class="text-muted" style="font-size:13px;">${w.zh}</span></span>
                            <span style="color:#d94f6a;font-size:14px;">(未作答)</span>
                        </div>
                    `;
                }
            }

            resultStats.textContent = `✅ ${correct} / ${total} 正确 (${Math.round(correct/total*100)}%)`;
            resultDetail.innerHTML = detailHTML;
            resultBox.classList.remove('hidden');
            updateErrorList();
        }

        function updateErrorList() {
            const unique = [...new Set(errorWords)];
            if (unique.length === 0) {
                errorList.classList.add('hidden');
                return;
            }
            errorList.classList.remove('hidden');
            errorTags.innerHTML = unique.map(e => `<span class="error-tag">${e}</span>`).join(' ');
        }

        // ================================================================
        // 10. 拍照
        // ================================================================
        async function openCamera() {
            try {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 400, height: 300 }
                });
                video.srcObject = stream;
                video.classList.remove('hidden');
                capturedImage.classList.add('hidden');
                cameraPlaceholder.classList.add('hidden');
                isCameraOpen = true;
            } catch (err) {
                alert('无法打开相机：' + err.message + '\n请允许摄像头权限，或使用「选图」功能。');
            }
        }

        function capturePhoto() {
            if (!isCameraOpen || !stream) {
                alert('请先点击「相机」');
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 400;
            canvas.height = video.videoHeight || 300;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataURL = canvas.toDataURL('image/jpeg', 0.8);
            capturedImage.src = dataURL;
            capturedImage.classList.remove('hidden');
            video.classList.add('hidden');
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                isCameraOpen = false;
            }
            performOCR(dataURL);
        }

        function uploadImage() {
            fileInput.click();
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataURL = ev.target.result;
                capturedImage.src = dataURL;
                capturedImage.classList.remove('hidden');
                video.classList.add('hidden');
                cameraPlaceholder.classList.add('hidden');
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                    isCameraOpen = false;
                }
                performOCR(dataURL);
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        }

        // ================================================================
        // 11. 添加单词
        // ================================================================
        function addWord() {
            const en = newWordEn.value.trim();
            const zh = newWordZh.value.trim();
            const phonetic = newWordPhonetic.value.trim() || '';
            const example = newWordExample.value.trim() || '';
            const exampleZh = example ? '' : ''; // 可后续完善

            if (!en || !zh) {
                alert('请输入英文和中文！');
                return;
            }
            if (words.some(w => w.en.toLowerCase() === en.toLowerCase())) {
                alert('该单词已存在！');
                return;
            }

            // 如果有例句但没有中文例句，提示
            let exampleZhInput = '';
            if (example) {
                exampleZhInput = prompt('请输入例句的中文翻译：');
                if (exampleZhInput === null) return;
            }

            words.push({
                en,
                zh,
                phonetic,
                example: example || '',
                exampleZh: exampleZhInput || ''
            });
            saveUnitWords();
            totalNum.textContent = words.length;
            newWordEn.value = '';
            newWordZh.value = '';
            newWordPhonetic.value = '';
            newWordExample.value = '';
            alert(`✅ 已添加单词: ${en} - ${zh}`);
            if (words.length === 1) {
                currentIndex = 0;
                answered = (mode === 'learn');
                updateUI();
            }
        }

        // ================================================================
        // 12. 切换单元
        // ================================================================
        function switchUnit() {
            const newUnit = parseInt(unitSelect.value);
            if (newUnit === currentUnit) return;

            if (results.length > 0 && results.some(r => r !== undefined)) {
                if (!confirm('切换单元将丢失当前进度，确定吗？')) {
                    unitSelect.value = currentUnit;
                    return;
                }
            }

            currentUnit = newUnit;
            loadUnit(currentUnit);
            totalNum.textContent = words.length;
            resetQuiz();
            updateUI();
        }

        // ================================================================
        // 13. 事件绑定
        // ================================================================
        function bindEvents() {
            modeLearn.addEventListener('click', () => {
                mode = 'learn';
                answered = true;
                modeLearn.classList.add('active');
                modeDictation.classList.remove('active');
                resetQuiz();
                updateUI();
            });

            modeDictation.addEventListener('click', () => {
                mode = 'dictation';
                answered = false;
                modeDictation.classList.add('active');
                modeLearn.classList.remove('active');
                resetQuiz();
                updateUI();
                setTimeout(() => speakWord(), 500);
            });

            unitSelect.addEventListener('change', switchUnit);

            speakBtn.addEventListener('click', speakWord);
            nextBtn.addEventListener('click', nextWord);
            checkBtn.addEventListener('click', showAnswer);
            resetBtn.addEventListener('click', resetQuizHandler);

            openCameraBtn.addEventListener('click', openCamera);
            captureBtn.addEventListener('click', capturePhoto);
            uploadBtn.addEventListener('click', uploadImage);
            fileInput.addEventListener('change', handleFileSelect);

            batchCheckBtn.addEventListener('click', batchCheck);

            addWordBtn.addEventListener('click', addWord);
            newWordEn.addEventListener('keydown', (e) => { if (e.key === 'Enter') addWord(); });
            newWordZh.addEventListener('keydown', (e) => { if (e.key === 'Enter') addWord(); });
        }

        // ================================================================
        // 启动
        // ================================================================
        init();
        console.log('🌸 初二英语听写小助手已加载！');
        console.log('📚 当前单元: Unit', currentUnit + 1, '单词数:', words.length);
        console.log('💡 学习模式显示例句，听写模式完全空白！');
    </script>
</body>
</html>
